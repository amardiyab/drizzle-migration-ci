name: Generate Drizzle Migrations

on:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate migrations
        run: bun run db:generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Check for changes
        id: changes
        run: |
          if [[ -n "$(git status --porcelain drizzle/)" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push migrations
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: generate drizzle migrations"
      
      - name: Push to target repository
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          echo "Pushing branch: $BRANCH_NAME"

          git push \
            https://x-access-token:${{ secrets.REPO_TOKEN }}@github.com/${{ secrets.REPO_OWNER }}/${{ secrets.REPO_NAME }}.git \
            HEAD:$BRANCH_NAME
